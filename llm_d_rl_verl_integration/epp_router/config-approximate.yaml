# Approximate prefix-cache EPP config for verl.
# Derived from guides/optimized-baseline/router/optimized-baseline.values.yaml, extended with
# file-discovery (verl file-based endpoint discovery) and vllmhttp-parser.

apiVersion: llm-d.ai/v1alpha1
kind: EndpointPickerConfig

plugins:
  - name: file-discovery
    type: file-discovery
    parameters:
      path: /tmp/epp-endpoints.yaml
      watchFile: true

  - name: queue-scorer
    type: queue-scorer

  - name: kv-cache-utilization-scorer
    type: kv-cache-utilization-scorer

  - name: prefix-cache-scorer
    type: prefix-cache-scorer

  - name: no-hit-lru-scorer
    type: no-hit-lru-scorer

  - name: metrics-source
    type: metrics-data-source

  - name: metrics-extractor
    type: core-metrics-extractor

  # Parses token_ids from /inference/v1/generate requests so approx-prefix-cache-producer
  # can compute prefix block hashes. The precise config gets tokens from KV events instead.
  - name: vllmhttp-parser
    type: vllmhttp-parser

requestHandler:
  parsers:
    - pluginRef: vllmhttp-parser

schedulingProfiles:
  - name: default
    plugins:
      - pluginRef: queue-scorer
        weight: 2
      - pluginRef: kv-cache-utilization-scorer
        weight: 2
      - pluginRef: prefix-cache-scorer
        weight: 3
      - pluginRef: no-hit-lru-scorer
        weight: 2

dataLayer:
  discovery:
    pluginRef: file-discovery
  sources:
    - pluginRef: metrics-source
      extractors:
        - pluginRef: metrics-extractor
