apiVersion: v1
kind: ConfigMap
metadata:
  name: llmd-epp-configs
  namespace: <your-namespace>
data:
  epp-config.yaml: |
    # Approximate prefix-cache EPP config for verl.
    # Derived from guides/optimized-baseline/router/optimized-baseline.values.yaml, extended with
    # file-discovery (verl file-based endpoint discovery) and vllmhttp-parser token_ids.

    apiVersion: llm-d.ai/v1alpha1
    kind: EndpointPickerConfig

    plugins:
      - name: file-discovery
        type: file-discovery
        parameters:
          path: /tmp/epp-endpoints.yaml
          watchFile: true

      - name: queue-scorer
        type: queue-scorer

      - name: kv-cache-utilization-scorer
        type: kv-cache-utilization-scorer

      - name: prefix-cache-scorer
        type: prefix-cache-scorer

      - name: no-hit-lru-scorer
        type: no-hit-lru-scorer

      - name: metrics-source
        type: metrics-data-source

      - name: metrics-extractor
        type: core-metrics-extractor

      - name: vllmhttp-parser
        type: vllmhttp-parser

    requestHandler:
      parsers:
        - pluginRef: vllmhttp-parser

    schedulingProfiles:
      - name: default
        plugins:
          - pluginRef: queue-scorer
            weight: 2
          - pluginRef: kv-cache-utilization-scorer
            weight: 2
          - pluginRef: prefix-cache-scorer
            weight: 3
          - pluginRef: no-hit-lru-scorer
            weight: 2

    dataLayer:
      discovery:
        pluginRef: file-discovery
      sources:
        - pluginRef: metrics-source
          extractors:
            - pluginRef: metrics-extractor

  epp-config-pd.yaml: |
    # llm-d EPP config for P/D disaggregation with VERL.

    apiVersion: llm-d.ai/v1alpha1
    kind: EndpointPickerConfig

    plugins:
      - name: file-discovery
        type: file-discovery
        parameters:
          path: /tmp/epp-endpoints.yaml
          watchFile: true

      - name: queue-scorer
        type: queue-scorer

      - name: kv-cache-utilization-scorer
        type: kv-cache-utilization-scorer

      - name: prefix-cache-scorer
        type: prefix-cache-scorer

      - name: no-hit-lru-scorer
        type: no-hit-lru-scorer

      - name: metrics-source
        type: metrics-data-source

      - name: metrics-extractor
        type: core-metrics-extractor

      - name: prefill-filter
        type: prefill-filter

      - name: decode-filter
        type: decode-filter

      - name: max-score-picker
        type: max-score-picker

      - name: prefix-based-pd-decider
        type: prefix-based-pd-decider
        parameters:
          nonCachedTokens: 16

      - name: disagg-profile-handler
        type: disagg-profile-handler
        parameters:
          deciders:
            prefill: prefix-based-pd-decider

      - name: vllmhttp-parser
        type: vllmhttp-parser

    requestHandler:
      parsers:
        - pluginRef: vllmhttp-parser

    schedulingProfiles:
      - name: prefill
        plugins:
          - pluginRef: prefill-filter
          - pluginRef: max-score-picker
          - pluginRef: prefix-cache-scorer
            weight: 3
          - pluginRef: queue-scorer
            weight: 2
          - pluginRef: no-hit-lru-scorer
            weight: 2

      - name: decode
        plugins:
          - pluginRef: decode-filter
          - pluginRef: max-score-picker
          - pluginRef: prefix-cache-scorer
            weight: 3
          - pluginRef: queue-scorer
            weight: 2
          - pluginRef: kv-cache-utilization-scorer
            weight: 2
          - pluginRef: no-hit-lru-scorer
            weight: 2

    dataLayer:
      discovery:
        pluginRef: file-discovery
      sources:
        - pluginRef: metrics-source
          extractors:
            - pluginRef: metrics-extractor
